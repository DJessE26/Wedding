<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mobile Page Viewer</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #120c08;
      font-family: Georgia, serif;
      touch-action: pan-y;
    }

    body {
      color: #fff;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(90, 58, 35, 0.35), transparent 45%),
        linear-gradient(180deg, #2a1c14 0%, #120c08 100%);
    }

    .topbar {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      right: 14px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pill, .music-btn {
      background: rgba(0,0,0,0.32);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
    }

    .viewer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(max(64px, env(safe-area-inset-top) + 52px))
        14px
        calc(max(72px, env(safe-area-inset-bottom) + 56px));
    }

    .book-wrap {
      width: min(92vw, 460px);
      height: min(78dvh, 760px);
      perspective: 2000px;
      position: relative;
    }

    .book {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .page {
      position: absolute;
      inset: 0;
      transform-origin: left center;
      transition: transform 0.9s cubic-bezier(0.22, 0.8, 0.2, 1);
      border-radius: 20px;
      overflow: hidden;
      background: #f8f1e7;
      box-shadow: 0 16px 30px rgba(0,0,0,0.28);
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* FIXED */
      pointer-events: none;
    }

    .page.flipped {
      transform: rotateY(-180deg);
    }

    .bottombar {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
    }

    .hint {
      background: rgba(0,0,0,0.32);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <div class="pill" id="pageCount">Page 1</div>
      <button class="music-btn" id="musicBtn">Pause music</button>
    </div>

    <div class="viewer">
      <div class="book-wrap" id="bookWrap">
        <div class="book" id="book"></div>
      </div>
    </div>

    <div class="bottombar">
      <div class="hint">Swipe left / right</div>
    </div>

  </div>

  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    const pagesData = [
      { image: 'images/page1.jpg' },
      { image: 'images/page2.jpg' },
      { image: 'images/page3.jpg' },
      { image: 'images/page4.jpg' },
    ];

    const book = document.getElementById('book');
    const pageCount = document.getElementById('pageCount');
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const bookWrap = document.getElementById('bookWrap');

    let currentPage = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    function buildBook() {
      book.innerHTML = '';

      pagesData.forEach((page, index) => {
        const el = document.createElement('div');
        el.className = 'page';
        el.style.zIndex = pagesData.length - index;

        el.innerHTML = `<img src="${page.image}" />`;
        book.appendChild(el);
      });

      updateBook();
    }

    function updateBook() {
      const pages = [...document.querySelectorAll('.page')];

      pages.forEach((p, i) => {
        p.classList.toggle('flipped', i < currentPage);
      });

      pageCount.textContent = `Page ${Math.min(currentPage + 1, pagesData.length)} of ${pagesData.length}`;
    }

    function nextPage() {
      if (currentPage < pagesData.length) {
        currentPage++;
        updateBook();
      }
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage--;
        updateBook();
      }
    }

    function tryStartMusic() {
      music.play().catch(() => {});
    }

    function onPointerDown(e) {
      tryStartMusic();
      startX = e.clientX;
      isDragging = true;
    }

    function onPointerUp(e) {
      if (!isDragging) return;

      currentX = e.clientX;
      const deltaX = currentX - startX;

      if (deltaX < -60) nextPage();
      else if (deltaX > 60) prevPage();

      isDragging = false;
    }

    musicBtn.addEventListener('click', () => {
      if (music.paused) {
        music.play();
        musicBtn.textContent = 'Pause music';
      } else {
        music.pause();
        musicBtn.textContent = 'Play music';
      }
    });

    bookWrap.addEventListener('pointerdown', onPointerDown);
    bookWrap.addEventListener('pointerup', onPointerUp);

    document.addEventListener('click', tryStartMusic, { once: true });

    buildBook();
  </script>
</body>
</html>
