<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Scroll Page Viewer</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: Georgia, serif;
      background: #120c08;
      color: #fff;
    }

    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      right: 14px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
    }

    .pill, .music-btn {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      color: #fff;
    }

    .viewer {
      flex: 1;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      scroll-snap-align: start;
    }

    .page img {
      max-width: 100%;
      max-height: 90vh;
      width: auto;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      background: #f6efe6;
    }

    .hint {
      position: fixed;
      bottom: max(14px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.4);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <div class="pill" id="pageCount">Page 1</div>
      <button class="music-btn" id="musicBtn">Pause music</button>
    </div>

    <div class="viewer" id="viewer"></div>

    <div class="hint">Scroll up / down</div>

  </div>

  <audio id="bgMusic" src="music.mp3" loop autoplay></audio>

  <script>
    const pagesData = [
      { image: 'images/page1.jpg' },
      { image: 'images/page2.jpg' },
      { image: 'images/page3.jpg' },
      { image: 'images/page4.jpg' },
      { image: 'images/page5.jpg' } // ✅ added page 5
    ];

    const viewer = document.getElementById('viewer');
    const pageCount = document.getElementById('pageCount');
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');

    function buildPages() {
      viewer.innerHTML = '';

      pagesData.forEach((page, index) => {
        const pageEl = document.createElement('div');
        pageEl.className = 'page';

        pageEl.innerHTML = `<img src="${page.image}" alt="Page ${index + 1}" />`;

        viewer.appendChild(pageEl);
      });
    }

    function updatePageIndicator() {
      const scrollTop = viewer.scrollTop;
      const pageHeight = viewer.clientHeight;
      const index = Math.round(scrollTop / pageHeight);

      pageCount.textContent = `Page ${index + 1} of ${pagesData.length}`;
    }

    // 🎵 Try autoplay (works on desktop, limited on mobile)
    function tryStartMusic() {
      music.play().catch(() => {});
    }

    // Fallback for mobile autoplay restrictions
    document.addEventListener('click', tryStartMusic, { once: true });
    document.addEventListener('touchstart', tryStartMusic, { once: true });

    viewer.addEventListener('scroll', updatePageIndicator);

    musicBtn.addEventListener('click', () => {
      if (music.paused) {
        music.play();
        musicBtn.textContent = 'Pause music';
      } else {
        music.pause();
        musicBtn.textContent = 'Play music';
      }
    });

    // Try autoplay immediately
    window.addEventListener('load', tryStartMusic);

    buildPages();
  </script>
</body>
</html>
